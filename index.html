  <title>To-Do App</title>
 <link rel="stylesheet" href="./style.css">

<body>
    <div class="container">
        <h1>My To-Do List</h1>
      
        <div class="input-area">
          <input type="text" id="todo-input" placeholder="Enter a task" />
          <button id="add-btn">Add</button>
        </div>
      
        <ul id="todo-list">
        
        </ul>
      </div>
      
<script>
  // document.addEventListener("clicked", ()=>{

  /**
   * 1. listening for event on add btn
   * 
   * 
   * **/
  // selecting the element
  let addBtn = document.querySelector('#add-btn')
addBtn.addEventListener("click", (element)=>{
  let  todovalue = document.querySelector("#todo-input").value
  if (todovalue == "" || todovalue ==null){
    alert("Input a value")
    return
  }
  else if (todovalue >1 ){
    alert("You already have this task")
    return
  }
  if (!isNaN(todovalue) ){
    alert("You cannot input a number")
    return
  }
})

const API_URL = 'https://jsonplaceholder.typicode.com';
const ENDPOINT = {
    users: '/users',
    todos: '/todos',
    posts: '/posts'
}

 fetch(API_URL + ENDPOINT.posts,{
    method: 'GET'
})
.then(res => res.json())
.then((data) => {
    let display = document.getElementById('todo-list');
    // console.log(data)
    data.forEach((res, index) => {
      fetch(`https://jsonplaceholder.typicode.com/users/${res.userId}`).then(res=>res.json()).then((users)=>{
        if(index < 20){
        display.innerHTML +=  `
  <li class = "task-text">${res.title}  -  ${users.username}</li>
  
  `
  
        }
      })
